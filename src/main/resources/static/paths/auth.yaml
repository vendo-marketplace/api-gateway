signIn:
  post:
    tags: [ Auth ]
    summary: Sign in
    security: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/auth/AuthRequest.yaml'
    responses:
      '200':
        description: Returns access and refresh tokens
        content:
          application/json:
            schema:
              $ref: '../schemas/auth/AuthResponse.yaml'

signUp:
  post:
    tags: [ Auth ]
    summary: Sign up
    security: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/auth/AuthRequest.yaml'
    responses:
      '200':
        description: Create user
      '409':
        description: User already exists
        content:
          application/json:
            schema:
              $ref: "../schemas/exception/ExceptionResponse.yaml"
      '400':
        description: Validation failed
        content:
          application/json:
            schema:
              $ref: "../schemas/exception/ExceptionResponse.yaml"

refresh:
  post:
    tags: [ Auth ]
    summary: Refresh token
    security: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/auth/RefreshRequest.yaml'
    responses:
      '200':
        description: Returns access and refresh tokens
        content:
          application/json:
            schema:
              $ref: '../schemas/auth/AuthResponse.yaml'

google:
  post:
    tags: [ Auth ]
    summary: Google OAuth
    security: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/auth/GoogleAuthRequest.yaml'
    responses:
      '200':
        description: Returns tokens
        content:
          application/json:
            schema:
              $ref: '../schemas/auth/AuthResponse.yaml'

me:
  get:
    tags: [ Auth ]
    summary: Get current user
    responses:
      '200':
        description: Current user info
        content:
          application/json:
            schema:
              $ref: '../schemas/auth/UserResponse.yaml'
      '401':
        description: Unauthorized

complete:
  patch:
    tags: [ Auth ]
    summary: Complete user authorization
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/auth/CompleteRequest.yaml"
    responses:
      '200':
        description: User authorization successfully completed
      '409':
        description: User is already completed
        content:
          application/json:
            schema:
              $ref: "../schemas/exception/ExceptionResponse.yaml"
      '400':
        description: Validation failed
        content:
          application/json:
            schema:
              $ref: "../schemas/exception/ExceptionResponse.yaml"

password:
  post:
    tags: [ Password ]
    summary: Forgot password — send OTP to email
    security: [ ]
    parameters:
      - in: query
        name: email
        required: true
        schema:
          type: string
    responses:
      '200':
        description: OTP sent

reset:
  put:
    tags: [ Password ]
    summary: Reset password using OTP
    security: [ ]
    parameters:
      - in: query
        name: otp
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/auth/ResetPasswordRequest.yaml'
    responses:
      '200':
        description: Password reset

resend:
  put:
    tags: [ Password ]
    summary: Resend password reset OTP
    security: [ ]
    parameters:
      - in: query
        name: email
        required: true
        schema:
          type: string
    responses:
      '200':
        description: OTP resent

send-otp:
  post:
    tags: [ Verification ]
    summary: Send verification OTP
    security: [ ]
    parameters:
      - in: query
        name: email
        required: true
        schema:
          type: string
    responses:
      '200':
        description: OTP sent

validate:
  post:
    tags: [ Verification ]
    summary: Validate OTP
    parameters:
      - in: query
        name: otp
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Verified
      '401':
        description: Unauthorized

resent-otp:
  post:
    tags: [ Verification ]
    summary: Resend verification OTP
    security: [ ]
    parameters:
      - in: query
        name: email
        required: true
        schema:
          type: string
    responses:
      '200':
        description: OTP resent