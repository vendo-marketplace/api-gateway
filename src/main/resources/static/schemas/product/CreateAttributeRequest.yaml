type: object
properties:
  title:
    type: string
    example: Memory
    pattern: ^[A-ZА-ЯІЇЄ][a-zа-яіїє]*(?:(?:[ -][A-Za-zА-ЯІЇЄа\-zа-яіїє]+)|(?:, [A-Za-zА-ЯІЇЄa-zа-яіїє]+))*$
  type:
    $ref: "./AttributeType.yaml"
  slug:
    type: string
    pattern: ^[a-z0-9]+(?:_[a-z0-9]+)*$
    example: laptop_memory
  required:
    type: boolean
  allowedValues:
    type: array
    items:
      type: string
