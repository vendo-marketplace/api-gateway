type: object
required: [title, price, quantity, categoryId]
properties:
  title:
    type: string
    minLength: 2
    maxLength: 100
    required: true
  description:
    type: string
    minLength: 5
    maxLength: 250
    required: true
  price:
    type: number
    minimum: 0
    example: 100
  quantity:
    type: integer
    example: 1
  categoryId:
    type: string
    required: true
  attributes:
    type: array
    items:
      type: object
      properties:
        id:
          type: string
        values:
          type: array
          items:
            type: string