type: object
required: [title, slug]
properties:
  title:
    type: string
    pattern: ^[A-ZА-ЯІЇЄ][A-Za-zА-ЯІЇЄа-яіїє]*(?:[ -][A-Za-zА-ЯІЇЄа-яіїє]+)*$
    example: Electronics
  slug:
    type: string
    pattern: ^[a-z0-9]+(?:_[a-z0-9]+)*$
    example: electronics
  parentId:
    type: string
  attributes:
    type: array
    items:
      type: string
