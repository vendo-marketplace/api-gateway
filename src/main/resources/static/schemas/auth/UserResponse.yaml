type: object
properties:
  id:
    type: string
  email:
    type: string
  emailVerified:
    type: boolean
  status:
    type: string
    enum:
      - LOCAL
      - GOOGLE
  roles:
    type: array
    items:
      $ref: "./UserRole.yaml"
  providerType:
    $ref: "./ProviderType.yaml"
  birthDate:
    type: string
    format: date
  fullName:
    type: string
  createdAt:
    type: string
    format: date-time
  updatedAt:
    type: string
    format: date-time