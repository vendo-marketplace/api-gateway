type: object
properties:
  id:
    type: string
  email:
    type: string
    example: example@mail.com
  emailVerified:
    type: boolean
    example: true
  status:
    type: string
    enum:
      - LOCAL
      - GOOGLE
  roles:
    type: array
    items:
      $ref: "./UserRole.yaml"
  providerType:
    $ref: "./ProviderType.yaml"
  birthDate:
    type: string
    format: date
    example: 2000-06-17
  fullName:
    type: string
    example: Jon Doe
  createdAt:
    type: string
    format: date-time
  updatedAt:
    type: string
    format: date-time