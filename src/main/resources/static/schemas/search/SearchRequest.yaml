type: object
properties:
  categoryId:
    type: string
  active:
    type: boolean
    example: true
  sort:
    type: object
    properties:
      sortBy:
        type: string
        example: CREATED_AT
        enum: [PRICE, CREATED_AT]
      direction:
        type: string
        example: ASC
        enum: [ASC, DESC]
  attributeFilter:
    type: object
    properties:
      attributes:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
              required: true
            values:
              type: array
              items:
                required: true
                type: string
  priceRangeFilter:
    type: object
    properties:
      minPrice:
        minimum: 0
        type: number
      maxPrice:
        example: 1000
        type: number
  size:
    type: integer
    example: 10
  page:
    type: integer
    example: 0